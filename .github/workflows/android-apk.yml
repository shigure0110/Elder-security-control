name: Android APK CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache/tooling
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK (wrapper if present, fallback to system gradle)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "./gradlew" ]]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            echo "gradlew not found, fallback to 'gradle assembleDebug'"
            gradle assembleDebug
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
